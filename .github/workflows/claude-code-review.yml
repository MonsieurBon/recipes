name: Claude Code Review

on:
  pull_request:
    types: [ opened, synchronize, ready_for_review, reopened ]
    # Optional: Only run on specific file changes
    # paths:
    #   - "src/**/*.ts"
    #   - "src/**/*.tsx"
    #   - "src/**/*.js"
    #   - "src/**/*.jsx"

jobs:
  claude-review:
    # Skip dependency-bump PRs from dependabot — they don't need an opinionated review.
    if: github.event.pull_request.user.login != 'dependabot[bot]'

    # One job per review pass, run in parallel so the wall-clock is the slower
    # pass rather than the sum of both. fail-fast is off so a failing code pass
    # doesn't cancel the in-flight security pass. Each pass gates independently:
    # the code review is required (its failure fails the job), the security
    # review is best-effort (its failure posts a notice but stays green).
    strategy:
      fail-fast: false
      matrix:
        include:
          - pass: code
            label: Code review
            model: opus
            reviewer: pr-code-reviewer
            required: true
          - pass: security
            label: Security review
            model: fable
            reviewer: web-security-reviewer
            required: false

    name: Claude ${{ matrix.pass }} review
    runs-on: ubuntu-latest
    permissions:
      contents: read
      pull-requests: write
      issues: read
      id-token: write

    steps:
      - name: Checkout repository
        uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
        with:
          fetch-depth: 1

      # Skip the review when the PR diff is identical to a diff we've already
      # reviewed (e.g. a force-push from a rebase onto main). The cache key
      # combines the pass, the PR number and a hash of the current diff; a cache
      # hit means this pass has already reviewed the same diff, so we skip the
      # expensive review step. Any new commit that actually changes the diff
      # produces a new key, missing the cache, and triggers a fresh review. The
      # key is namespaced per pass so the two passes never satisfy each other's
      # cache.
      - name: Compute PR diff hash
        id: diff-hash
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          set -euo pipefail
          diff=$(gh pr diff "${{ github.event.pull_request.number }}")
          hash=$(printf '%s' "$diff" | sha256sum | cut -d' ' -f1)
          echo "hash=$hash" >> "$GITHUB_OUTPUT"

      - name: Look up cache for this diff
        id: diff-cache
        uses: actions/cache@55cc8345863c7cc4c66a329aec7e433d2d1c52a9 # v6.1.0
        with:
          path: .claude-review-marker
          key: claude-review-${{ matrix.pass }}-pr-${{ github.event.pull_request.number }}-${{ steps.diff-hash.outputs.hash }}

      # Run the review pass. continue-on-error keeps the job going even if the
      # pass fails; whether it succeeded is decided from the execution output in
      # the assess step below.
      - name: Run review
        id: review
        if: steps.diff-cache.outputs.cache-hit != 'true'
        continue-on-error: true
        uses: ./.github/actions/claude-review
        with:
          model: ${{ matrix.model }}
          reviewer: ${{ matrix.reviewer }}
          oauth_token: ${{ secrets.CLAUDE_CODE_OAUTH_TOKEN }}
          repo: ${{ github.repository }}
          pr: ${{ github.event.pull_request.number }}

      # Decide success from the pass's execution output and, if it failed, post a
      # PR comment saying so. A required pass (code review) then fails the job; a
      # best-effort pass (security review) posts the notice but keeps the job
      # green.
      - name: Assess review and post failure notice
        id: assess
        if: steps.diff-cache.outputs.cache-hit != 'true'
        env:
          GH_TOKEN: ${{ github.token }}
          PR: ${{ github.event.pull_request.number }}
          RUN_URL: ${{ github.server_url }}/${{ github.repository }}/actions/runs/${{ github.run_id }}
          FILE: ${{ steps.review.outputs.execution_file }}
          LABEL: ${{ matrix.label }}
          MODEL: ${{ matrix.model }}
          REVIEWER: ${{ matrix.reviewer }}
          REQUIRED: ${{ matrix.required }}
        run: |
          set -uo pipefail

          # Capitalize the model id for display (opus -> Opus, fable -> Fable);
          # the lowercase form is only needed as the --model argument.
          model_label="${MODEL^}"

          if .github/scripts/claude-review-ok.sh "$FILE" >/dev/null; then
            echo "$LABEL ($model_label) posted."
            exit 0
          fi

          reason=$(.github/scripts/claude-review-reason.sh "$FILE")

          if [ "$REQUIRED" = "true" ]; then
            echo "::error::$LABEL ($model_label) failed; posting a notice and failing the job."
            gh pr comment "$PR" --body "$(printf '## ❌ %s did not run (%s)\n\nThe `%s` pass on %s failed, so no review was posted.\n\n%s\n\nFull error: [run log](%s).\n' "$LABEL" "$model_label" "$REVIEWER" "$model_label" "$reason" "$RUN_URL")" \
              || echo "::error::Could not post the failure notice."
            exit 1
          fi

          echo "::warning::$LABEL ($model_label) failed; posting a notice and keeping the job green."
          gh pr comment "$PR" --body "$(printf '## ⚠️ %s did not run (%s)\n\nThe `%s` pass on %s failed, so no review was posted. This does not block the PR.\n\n%s\n\nFull error: [run log](%s).\n' "$LABEL" "$model_label" "$REVIEWER" "$model_label" "$reason" "$RUN_URL")" \
            || echo "::warning::Could not post the failure notice."

      # Mark the diff reviewed only after the pass succeeded, so a failed run
      # isn't cached as "done" — it will be retried on the next run of the same
      # diff. (A best-effort security failure exits 0 above, so it does cache;
      # the code review is the gating pass that retries on failure.)
      - name: Mark this diff as reviewed
        if: steps.diff-cache.outputs.cache-hit != 'true' && steps.assess.outcome == 'success'
        run: touch .claude-review-marker
