name: Build recipe

on:
  push:
    branches: [ "**" ]
  pull_request:
    branches: [ "main" ]

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v3
      - name: Set up Node.js 24.x
        uses: actions/setup-node@v3
        with:
          node-version: '24.16.0'
          cache: 'npm'
      - run: npm ci
      - name: lint frontend
        run: npm run lint

      - name: Set up JDK 21
        uses: actions/setup-java@v3
        with:
          java-version: '21'
          distribution: 'temurin'
          cache: maven
      - name: lint backend
        run: mvn -B spotless:check

      - name: test frontend
        run: npm run test:ci

      - name: test backend
        run: mvn -B test

      - name: build backend
        run: mvn -B -DskipTests=true clean install
