name: Build recipe

on:
  push:
    branches: [ "**" ]
  pull_request:
    branches: [ "main" ]

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
      - name: Set up Node.js 24.x
        uses: actions/setup-node@48b55a011bda9f5d6aeb4c2d9c7362e8dae4041e # v6.4.0
        with:
          node-version: '24.16.0'
          cache: 'npm'
      - run: npm ci
      - name: lint frontend
        run: npm run lint

      - name: Set up JDK
        uses: actions/setup-java@ad2b38190b15e4d6bdf0c97fb4fca8412226d287 # v5.3.0
        with:
          java-version: '25'
          distribution: 'temurin'
          cache: maven
      - name: lint backend
        run: mvn -B spotless:check

      - name: test frontend
        run: npm run test:ci

      - name: test backend
        run: mvn -B test

      - name: build backend
        run: mvn -B -DskipTests=true clean install

      # Exercises the same Dockerfile the release builds (semantic-release
      # publishCmd in package.json). The jar is packaged by a different
      # maven command there, so this validates the Dockerfile, not that build.
      - name: build Docker image
        run: docker build -t recipes:ci .
