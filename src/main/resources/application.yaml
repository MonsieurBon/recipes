spring:
  application:
    name: recipes
  datasource:
    url: jdbc:mysql://${DB_HOST:localhost}:${DB_PORT:3306}/recipes
    username: recipes
    password: ${DB_PASSWORD}
    driver-class-name: com.mysql.cj.jdbc.Driver
  flyway:
    user: recipes-flyway
    password: ${FLYWAY_PASSWORD}
    placeholders:
      '[db_password]': ${DB_PASSWORD}
  jpa:
    hibernate:
      ddl-auto: validate
  web:
    resources:
      static-locations: "classpath:/public/,classpath:/static/browser/"
  mvc:
    contentnegotiation:
      media-types:
        woff2: "font/woff2"

auth:
  jwt:
    secret: ${JWT_SECRET:}
    access-ttl: ${JWT_ACCESS_TTL:PT15M}
    refresh-ttl: ${JWT_REFRESH_TTL:P7D}
  refresh-cookie:
    secure: ${REFRESH_COOKIE_SECURE:true}
