<mat-card>
  <mat-card-header>
    <mat-card-title>{{ 'logoutFailed.title' | translate }}</mat-card-title>
  </mat-card-header>
  <mat-card-content>
    <p>{{ 'logoutFailed.message1' | translate }}</p>
    <p>{{ 'logoutFailed.message2' | translate }}</p>
    <button mat-flat-button data-test-id="retryLogout" [disabled]="retrying()" (click)="retry()">
      {{ 'logoutFailed.retry' | translate }}
    </button>
    @if (retryFailed()) {
      <p class="retry-failed" data-test-id="retryFailed">
        {{ 'logoutFailed.retryFailed' | translate }}
      </p>
    }
  </mat-card-content>
</mat-card>
