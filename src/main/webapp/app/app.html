<mat-toolbar>
  <!--  <button matIconButton data-test-id="menuToggle" aria-label="menu toggle">-->
  <!--    <mat-icon>menu</mat-icon>-->
  <!--  </button>-->
  <span data-test-id="appTitle">Rezepte</span>
  <span class="spacer"></span>
  <button matIconButton data-test-id="profileIcon" [matMenuTriggerFor]="userMenu">
    <mat-icon>person</mat-icon>
  </button>
  <mat-menu #userMenu="matMenu" class="user-menu">
    @if (loggedIn()) {
      <button mat-menu-item data-test-id="logout" (click)="logout()">
        <mat-icon>logout</mat-icon><span>Logout</span>
      </button>
    } @else {
      <button mat-menu-item data-test-id="register" routerLink="register">
        <mat-icon>person_add</mat-icon><span>Registrieren</span>
      </button>
      <button mat-menu-item data-test-id="login" routerLink="login">
        <mat-icon>login</mat-icon><span>Login</span>
      </button>
    }
  </mat-menu>
  <!--  <button matIconButton data-test-id="profileImage">-->
  <!--    <img class="profile-image" src="assets/images/avatar.png" alt="Profile" />-->
  <!--  </button>-->
</mat-toolbar>
<div class="content">
  <router-outlet></router-outlet>
</div>
