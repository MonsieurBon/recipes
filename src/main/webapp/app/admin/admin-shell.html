<header class="admin-header">
  @if (isCompact()) {
    <button
      matIconButton
      [attr.aria-label]="'admin.back' | translate"
      data-test-id="adminBack"
      (click)="back()"
    >
      <mat-icon>chevron_left</mat-icon>
    </button>
  }
  <h1>{{ 'app.administration' | translate }}</h1>
</header>
<nav
  mat-tab-nav-bar
  [tabPanel]="panel"
  mat-stretch-tabs="false"
  [attr.aria-label]="'admin.areas' | translate"
>
  <a
    mat-tab-link
    routerLink="users"
    routerLinkActive
    #usersLink="routerLinkActive"
    [active]="usersLink.isActive"
    data-test-id="adminTabUsers"
  >
    {{ 'admin.users' | translate }}
  </a>
</nav>
<mat-tab-nav-panel #panel class="admin-content">
  <router-outlet></router-outlet>
</mat-tab-nav-panel>
